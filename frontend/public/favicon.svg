<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  
  <!-- Building outline -->
  <rect x="6" y="4" width="20" height="24" rx="2" fill="none" stroke="#3282b8" stroke-width="1.5"/>
  
  <!-- Floors -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="#2a3f5f" stroke-width="1"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="#2a3f5f" stroke-width="1"/>
  
  <!-- Windows/Zones - Floor 3 -->
  <rect x="8" y="6" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  <rect x="14" y="6" width="4" height="4" rx="0.5" fill="#44cc44" opacity="0.7"/>
  <rect x="20" y="6" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  
  <!-- Windows/Zones - Floor 2 -->
  <rect x="8" y="14" width="4" height="4" rx="0.5" fill="#ff9800" opacity="0.7"/>
  <rect x="14" y="14" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  <rect x="20" y="14" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  
  <!-- Windows/Zones - Floor 1 -->
  <rect x="8" y="22" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  <rect x="14" y="22" width="4" height="4" rx="0.5" fill="#3282b8" opacity="0.7"/>
  <rect x="20" y="22" width="4" height="4" rx="0.5" fill="#4caf50" opacity="0.7"/>
  
  <!-- HVAC indicator (small gear) -->
  <circle cx="26" cy="28" r="3" fill="none" stroke="#0f4c75" stroke-width="1"/>
  <circle cx="26" cy="28" r="1" fill="#0f4c75"/>
</svg>
